<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Viewport — critical for mobile -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />

    <!-- PWA theme -->
    <meta name="theme-color" content="#16a34a" />
    <meta name="background-color" content="#ffffff" />

    <!-- App description -->
    <meta
      name="description"
      content="Spida Tractors — Affordable mechanized farming. Connect farmers with tractor owners instantly."
    />
    <meta name="keywords" content="tractor, farming, agriculture, Nigeria, mechanization" />

    <!-- PWA manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />

    <!-- Apple PWA (iOS home screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SpidaTractors" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/icons/icon-192x192.png" />

    <!-- iOS Splash screens (portrait) -->
    <!-- iPhone SE -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 375px) and (device-height: 667px)"
      href="%PUBLIC_URL%/splash/splash-750x1334.png"
    />
    <!-- iPhone 12/13/14 -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 390px) and (device-height: 844px)"
      href="%PUBLIC_URL%/splash/splash-1170x2532.png"
    />
    <!-- iPhone 14 Pro Max -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 430px) and (device-height: 932px)"
      href="%PUBLIC_URL%/splash/splash-1290x2796.png"
    />
    <!-- iPad -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 768px) and (device-height: 1024px)"
      href="%PUBLIC_URL%/splash/splash-1536x2048.png"
    />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="SpidaTractors" />

    <!-- Open Graph (for sharing) -->
    <meta property="og:title"       content="Spida Tractors" />
    <meta property="og:description" content="Affordable mechanized farming in Nigeria." />
    <meta property="og:type"        content="website" />
    <meta property="og:image"       content="%PUBLIC_URL%/icons/icon-512x512.png" />

    <title>Spida Tractors</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
